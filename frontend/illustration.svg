<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background glow -->
  <ellipse cx="250" cy="200" rx="200" ry="160" fill="url(#bgGlow)" opacity="0.3"/>
  
  <!-- Document base -->
  <rect x="130" y="60" width="180" height="240" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="130" y="60" width="180" height="240" rx="12" fill="url(#docGrad)" opacity="0.05"/>
  
  <!-- Document header -->
  <rect x="130" y="60" width="180" height="45" rx="12" fill="#1E3A8A" opacity="0.08"/>
  <rect x="130" y="90" width="180" height="15" fill="#1E3A8A" opacity="0.08"/>
  
  <!-- Profile circle -->
  <circle cx="165" cy="82" r="16" fill="#3B82F6" opacity="0.2"/>
  <circle cx="165" cy="82" r="10" fill="#3B82F6" opacity="0.4"/>
  
  <!-- Text lines -->
  <rect x="190" y="74" width="80" height="6" rx="3" fill="#1E3A8A" opacity="0.25"/>
  <rect x="190" y="86" width="55" height="5" rx="2.5" fill="#3B82F6" opacity="0.3"/>
  
  <!-- Skill bars -->
  <rect x="150" y="120" width="120" height="5" rx="2.5" fill="#E2E8F0"/>
  <rect x="150" y="120" width="95" height="5" rx="2.5" fill="#3B82F6"/>
  
  <rect x="150" y="135" width="120" height="5" rx="2.5" fill="#E2E8F0"/>
  <rect x="150" y="135" width="70" height="5" rx="2.5" fill="#60A5FA"/>
  
  <rect x="150" y="150" width="120" height="5" rx="2.5" fill="#E2E8F0"/>
  <rect x="150" y="150" width="105" height="5" rx="2.5" fill="#3B82F6"/>
  
  <rect x="150" y="165" width="120" height="5" rx="2.5" fill="#E2E8F0"/>
  <rect x="150" y="165" width="50" height="5" rx="2.5" fill="#60A5FA"/>
  
  <!-- Content lines -->
  <rect x="150" y="185" width="120" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="150" y="195" width="90" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="150" y="205" width="110" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="150" y="215" width="75" height="4" rx="2" fill="#E2E8F0"/>
  
  <!-- Score circle (right side) -->
  <circle cx="350" cy="130" r="55" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="350" cy="130" r="55" fill="url(#scoreGlow)" opacity="0.1"/>
  
  <!-- Score arc -->
  <circle cx="350" cy="130" r="42" stroke="#E2E8F0" stroke-width="8" fill="none"/>
  <circle cx="350" cy="130" r="42" stroke="url(#scoreArc)" stroke-width="8" fill="none" 
    stroke-dasharray="220 264" stroke-dashoffset="66" stroke-linecap="round" transform="rotate(-90 350 130)"/>
  
  <text x="350" y="126" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700" font-size="24" fill="#1E3A8A">84</text>
  <text x="350" y="142" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="9" fill="#64748B">SCORE</text>

  <!-- Floating skill tags -->
  <rect x="320" y="200" width="90" height="26" rx="13" fill="#DBEAFE"/>
  <text x="365" y="217" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600" fill="#1D4ED8">Python</text>
  
  <rect x="110" y="280" width="100" height="26" rx="13" fill="#EFF6FF"/>
  <text x="160" y="297" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600" fill="#3B82F6">Machine Learning</text>
  
  <rect x="340" y="250" width="80" height="26" rx="13" fill="#FEF3C7"/>
  <text x="380" y="267" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600" fill="#D97706">SQL</text>
  
  <!-- Check marks for matching skills -->
  <circle cx="145" cy="295" r="10" fill="#10B981" opacity="0.2"/>
  <text x="145" y="299" text-anchor="middle" font-size="10" fill="#10B981">✓</text>
  
  <circle cx="410" cy="215" r="10" fill="#10B981" opacity="0.2"/>
  <text x="410" y="219" text-anchor="middle" font-size="10" fill="#10B981">✓</text>
  
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <linearGradient id="scoreArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="scoreGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
  </defs>
</svg>
